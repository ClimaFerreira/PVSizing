openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PV Sizing Tool API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer management
  - name: panels
    description: Solar panel equipment
  - name: inverters
    description: Inverter equipment
  - name: batteries
    description: Battery equipment
  - name: systems
    description: PV system configurations
  - name: pvgis
    description: PVGIS solar production data
  - name: financial
    description: Financial calculations
  - name: compatibility
    description: System compatibility checks
  - name: dashboard
    description: Dashboard summaries
  - name: tools
    description: Engineering tools (string sizing, cable sizing, locations)
  - name: ai
    description: AI-powered tools (invoice parsing, datasheet import, auto-sizing)
  - name: proposals
    description: Technical proposals
  - name: projects
    description: Shared studies / projects (SolarDim + FotoCalc)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- Customers ---
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Validation error

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # --- Solar Panels ---
  /panels:
    get:
      operationId: listPanels
      tags: [panels]
      summary: List all solar panels
      responses:
        "200":
          description: List of panels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SolarPanel"
    post:
      operationId: createPanel
      tags: [panels]
      summary: Create a solar panel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSolarPanelBody"
      responses:
        "201":
          description: Panel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SolarPanel"
        "400":
          description: Validation error

  /panels/{id}:
    get:
      operationId: getPanel
      tags: [panels]
      summary: Get a solar panel by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Solar panel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SolarPanel"
        "404":
          description: Not found
    patch:
      operationId: updatePanel
      tags: [panels]
      summary: Update a solar panel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSolarPanelBody"
      responses:
        "200":
          description: Updated panel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SolarPanel"
        "404":
          description: Not found
    delete:
      operationId: deletePanel
      tags: [panels]
      summary: Delete a solar panel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # --- Inverters ---
  /inverters:
    get:
      operationId: listInverters
      tags: [inverters]
      summary: List all inverters
      responses:
        "200":
          description: List of inverters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inverter"
    post:
      operationId: createInverter
      tags: [inverters]
      summary: Create an inverter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInverterBody"
      responses:
        "201":
          description: Inverter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inverter"
        "400":
          description: Validation error

  /inverters/{id}:
    get:
      operationId: getInverter
      tags: [inverters]
      summary: Get an inverter by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inverter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inverter"
        "404":
          description: Not found
    patch:
      operationId: updateInverter
      tags: [inverters]
      summary: Update an inverter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInverterBody"
      responses:
        "200":
          description: Updated inverter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inverter"
        "404":
          description: Not found
    delete:
      operationId: deleteInverter
      tags: [inverters]
      summary: Delete an inverter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # --- Batteries ---
  /batteries:
    get:
      operationId: listBatteries
      tags: [batteries]
      summary: List all batteries
      responses:
        "200":
          description: List of batteries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Battery"
    post:
      operationId: createBattery
      tags: [batteries]
      summary: Create a battery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBatteryBody"
      responses:
        "201":
          description: Battery created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Battery"
        "400":
          description: Validation error

  /batteries/{id}:
    get:
      operationId: getBattery
      tags: [batteries]
      summary: Get a battery by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Battery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Battery"
        "404":
          description: Not found
    patch:
      operationId: updateBattery
      tags: [batteries]
      summary: Update a battery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBatteryBody"
      responses:
        "200":
          description: Updated battery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Battery"
        "404":
          description: Not found
    delete:
      operationId: deleteBattery
      tags: [batteries]
      summary: Delete a battery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # --- PV Systems ---
  /systems:
    get:
      operationId: listSystems
      tags: [systems]
      summary: List all PV system configurations
      responses:
        "200":
          description: List of systems
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PvSystem"
    post:
      operationId: createSystem
      tags: [systems]
      summary: Create a PV system configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePvSystemBody"
      responses:
        "201":
          description: System created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PvSystem"
        "400":
          description: Validation error

  /systems/{id}:
    get:
      operationId: getSystem
      tags: [systems]
      summary: Get a PV system by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PV system
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PvSystem"
        "404":
          description: Not found
    patch:
      operationId: updateSystem
      tags: [systems]
      summary: Update a PV system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePvSystemBody"
      responses:
        "200":
          description: Updated system
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PvSystem"
        "404":
          description: Not found
    delete:
      operationId: deleteSystem
      tags: [systems]
      summary: Delete a PV system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /systems/{id}/compatibility:
    get:
      operationId: checkSystemCompatibility
      tags: [compatibility]
      summary: Check system component compatibility
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Compatibility result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatibilityResult"
        "404":
          description: Not found

  /systems/{id}/pvgis:
    get:
      operationId: getSystemPvgis
      tags: [pvgis]
      summary: Get PVGIS solar production data for a system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: inclinacao2
          in: query
          required: false
          schema:
            type: number
          description: Second MPPT tilt angle (degrees)
        - name: azimute2
          in: query
          required: false
          schema:
            type: number
          description: Second MPPT azimuth (degrees from South)
        - name: numPaineis2
          in: query
          required: false
          schema:
            type: integer
          description: Number of panels on second MPPT
      responses:
        "200":
          description: PVGIS production data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PvgisResult"
        "404":
          description: Not found
        "502":
          description: PVGIS API error

  /systems/{id}/financial:
    post:
      operationId: calculateFinancial
      tags: [financial]
      summary: Calculate full 25-year financial analysis for a system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinancialInputBody"
      responses:
        "200":
          description: Financial result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialResult"
        "404":
          description: Not found

  # --- Tools ---
  /tools/string-sizing:
    post:
      operationId: calculateStringSizing
      tags: [tools]
      summary: Calculate string sizing with thermal analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StringSizingBody"
      responses:
        "200":
          description: String sizing result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringSizingResult"
        "400":
          description: Validation error

  /tools/locations:
    get:
      operationId: listLocations
      tags: [tools]
      summary: List Portuguese locations with coordinates
      responses:
        "200":
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"

  # --- AI Tools ---
  /tools/parse-invoice:
    post:
      operationId: parseInvoice
      tags: [ai]
      summary: Parse energy invoice (PDF/image) with AI to extract consumption data
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        "200":
          description: Extracted invoice data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceData"
        "400":
          description: Invalid file
        "502":
          description: AI error

  /tools/auto-size:
    post:
      operationId: autoSizeSystem
      tags: [ai]
      summary: Automatically calculate PV system size from consumption data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoSizeBody"
      responses:
        "200":
          description: System sizing recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoSizeResult"

  /tools/battery-size:
    post:
      operationId: sizeBattery
      tags: [ai]
      summary: Calculate optimal battery capacity for a system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatterySizeBody"
      responses:
        "200":
          description: Battery sizing result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatterySizeResult"

  /tools/import-datasheet:
    post:
      operationId: importDatasheet
      tags: [ai]
      summary: Extract equipment specs from datasheet PDF/image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                tipoEquipamento:
                  type: string
                  enum: [painel, inversor, bateria]
              required: [file, tipoEquipamento]
      responses:
        "200":
          description: Extracted equipment specs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasheetResult"
        "400":
          description: Invalid request
        "502":
          description: AI error

  # --- Proposals ---
  /proposals:
    get:
      operationId: listProposals
      tags: [proposals]
      summary: List all proposals
      responses:
        "200":
          description: List of proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposal"
    post:
      operationId: createProposal
      tags: [proposals]
      summary: Create a technical proposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProposalBody"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /proposals/{id}:
    get:
      operationId: getProposal
      tags: [proposals]
      summary: Get a proposal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "404":
          description: Not found
    delete:
      operationId: deleteProposal
      tags: [proposals]
      summary: Delete a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- Wizard draft ---
  /wizard/draft:
    get:
      operationId: getWizardDraft
      tags: [wizard]
      summary: Get wizard draft by session ID
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Draft found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardDraft"
        "404":
          description: No draft found for this session
    put:
      operationId: upsertWizardDraft
      tags: [wizard]
      summary: Create or update a wizard draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertWizardDraftBody"
      responses:
        "200":
          description: Draft saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WizardDraft"
    delete:
      operationId: deleteWizardDraft
      tags: [wizard]
      summary: Delete a wizard draft
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # --- Dashboard / summary ---
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # --- Shared Projects (Estudos) ---
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all shared studies/projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a shared study/project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Validation error

  /projects/{id}/duplicate:
    post:
      operationId: duplicateProject
      tags: [projects]
      summary: Duplicate a project (copies all fields incl. draftData, resets status)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "201":
          description: Project duplicated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # --- Customer ---
    Customer:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        morada:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        tipoCliente:
          type: string
          enum: [Residencial, Comercial, Industrial]
        precoEletricidade:
          type: number
        potenciaContratada:
          type: number
        perfilConsumo:
          type: string
          enum: [Diurno, Noturno, Personalizado]
        consumoMensal:
          type: ["number", "null"]
        consumoAnual:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nome
        - morada
        - latitude
        - longitude
        - tipoCliente
        - precoEletricidade
        - potenciaContratada
        - perfilConsumo
        - consumoMensal
        - consumoAnual
        - createdAt

    CreateCustomerBody:
      type: object
      properties:
        nome:
          type: string
        morada:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        tipoCliente:
          type: string
          enum: [Residencial, Comercial, Industrial]
        precoEletricidade:
          type: number
        potenciaContratada:
          type: number
        perfilConsumo:
          type: string
          enum: [Diurno, Noturno, Personalizado]
        consumoMensal:
          type: ["number", "null"]
        consumoAnual:
          type: ["number", "null"]
      required:
        - nome
        - morada
        - latitude
        - longitude
        - tipoCliente
        - precoEletricidade
        - potenciaContratada
        - perfilConsumo

    UpdateCustomerBody:
      type: object
      properties:
        nome:
          type: string
        morada:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        tipoCliente:
          type: string
          enum: [Residencial, Comercial, Industrial]
        precoEletricidade:
          type: number
        potenciaContratada:
          type: number
        perfilConsumo:
          type: string
          enum: [Diurno, Noturno, Personalizado]
        consumoMensal:
          type: ["number", "null"]
        consumoAnual:
          type: ["number", "null"]

    # --- Solar Panel ---
    SolarPanel:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        fabricante:
          type: string
        potencia:
          type: number
        voc:
          type: number
        vmp:
          type: number
        isc:
          type: number
        imp:
          type: number
        coeficienteTemperatura:
          type: number
