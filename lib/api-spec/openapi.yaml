openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PV Sizing Tool API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer management
  - name: panels
    description: Solar panel equipment
  - name: inverters
    description: Inverter equipment
  - name: batteries
    description: Battery equipment
  - name: systems
    description: PV system configurations
  - name: pvgis
    description: PVGIS solar production data
  - name: financial
    description: Financial calculations
  - name: compatibility
    description: System compatibility checks
  - name: dashboard
    description: Dashboard summaries
  - name: tools
    description: Engineering tools (string sizing, cable sizing, locations)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- Customers ---
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Validation error

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # --- Solar Panels ---
  /panels:
    get:
      operationId: listPanels
      tags: [panels]
      summary: List all solar panels
      responses:
        "200":
          description: List of panels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SolarPanel"
    post:
      operationId: createPanel
      tags: [panels]
      summary: Create a solar panel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSolarPanelBody"
      responses:
        "201":
          description: Panel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SolarPanel"
        "400":
          description: Validation error

  /panels/{id}:
    get:
      operationId: getPanel
      tags: [panels]
      summary: Get a solar panel by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Solar panel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SolarPanel"
        "404":
          description: Not found
    patch:
      operationId: updatePanel
      tags: [panels]
      summary: Update a solar panel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSolarPanelBody"
      responses:
        "200":
          description: Updated panel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SolarPanel"
        "404":
          description: Not found
    delete:
      operationId: deletePanel
      tags: [panels]
      summary: Delete a solar panel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # --- Inverters ---
  /inverters:
    get:
      operationId: listInverters
      tags: [inverters]
      summary: List all inverters
      responses:
        "200":
          description: List of inverters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inverter"
    post:
      operationId: createInverter
      tags: [inverters]
      summary: Create an inverter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInverterBody"
      responses:
        "201":
          description: Inverter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inverter"
        "400":
          description: Validation error

  /inverters/{id}:
    get:
      operationId: getInverter
      tags: [inverters]
      summary: Get an inverter by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inverter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inverter"
        "404":
          description: Not found
    patch:
      operationId: updateInverter
      tags: [inverters]
      summary: Update an inverter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInverterBody"
      responses:
        "200":
          description: Updated inverter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inverter"
        "404":
          description: Not found
    delete:
      operationId: deleteInverter
      tags: [inverters]
      summary: Delete an inverter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # --- Batteries ---
  /batteries:
    get:
      operationId: listBatteries
      tags: [batteries]
      summary: List all batteries
      responses:
        "200":
          description: List of batteries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Battery"
    post:
      operationId: createBattery
      tags: [batteries]
      summary: Create a battery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBatteryBody"
      responses:
        "201":
          description: Battery created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Battery"
        "400":
          description: Validation error

  /batteries/{id}:
    get:
      operationId: getBattery
      tags: [batteries]
      summary: Get a battery by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Battery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Battery"
        "404":
          description: Not found
    patch:
      operationId: updateBattery
      tags: [batteries]
      summary: Update a battery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBatteryBody"
      responses:
        "200":
          description: Updated battery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Battery"
        "404":
          description: Not found
    delete:
      operationId: deleteBattery
      tags: [batteries]
      summary: Delete a battery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # --- PV Systems ---
  /systems:
    get:
      operationId: listSystems
      tags: [systems]
      summary: List all PV system configurations
      responses:
        "200":
          description: List of systems
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PvSystem"
    post:
      operationId: createSystem
      tags: [systems]
      summary: Create a PV system configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePvSystemBody"
      responses:
        "201":
          description: System created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PvSystem"
        "400":
          description: Validation error

  /systems/{id}:
    get:
      operationId: getSystem
      tags: [systems]
      summary: Get a PV system by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PV system
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PvSystem"
        "404":
          description: Not found
    patch:
      operationId: updateSystem
      tags: [systems]
      summary: Update a PV system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePvSystemBody"
      responses:
        "200":
          description: Updated system
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PvSystem"
        "404":
          description: Not found
    delete:
      operationId: deleteSystem
      tags: [systems]
      summary: Delete a PV system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /systems/{id}/compatibility:
    get:
      operationId: checkSystemCompatibility
      tags: [compatibility]
      summary: Check system component compatibility
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Compatibility result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatibilityResult"
        "404":
          description: Not found

  /systems/{id}/pvgis:
    get:
      operationId: getSystemPvgis
      tags: [pvgis]
      summary: Get PVGIS solar production data for a system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: inclinacao2
          in: query
          required: false
          schema:
            type: number
          description: Second MPPT tilt angle (degrees)
        - name: azimute2
          in: query
          required: false
          schema:
            type: number
          description: Second MPPT azimuth (degrees from South)
        - name: numPaineis2
          in: query
          required: false
          schema:
            type: integer
          description: Number of panels on second MPPT
      responses:
        "200":
          description: PVGIS production data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PvgisResult"
        "404":
          description: Not found
        "502":
          description: PVGIS API error

  /systems/{id}/financial:
    post:
      operationId: calculateFinancial
      tags: [financial]
      summary: Calculate full 25-year financial analysis for a system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinancialInputBody"
      responses:
        "200":
          description: Financial result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialResult"
        "404":
          description: Not found

  # --- Tools ---
  /tools/string-sizing:
    post:
      operationId: calculateStringSizing
      tags: [tools]
      summary: Calculate string sizing with thermal analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StringSizingBody"
      responses:
        "200":
          description: String sizing result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringSizingResult"
        "400":
          description: Validation error

  /tools/locations:
    get:
      operationId: listLocations
      tags: [tools]
      summary: List Portuguese locations with coordinates
      responses:
        "200":
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"

  # --- Dashboard / summary ---
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # --- Customer ---
    Customer:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        morada:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        tipoCliente:
          type: string
          enum: [Residencial, Comercial, Industrial]
        precoEletricidade:
          type: number
        potenciaContratada:
          type: number
        perfilConsumo:
          type: string
          enum: [Diurno, Noturno, Personalizado]
        consumoMensal:
          type: ["number", "null"]
        consumoAnual:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nome
        - morada
        - latitude
        - longitude
        - tipoCliente
        - precoEletricidade
        - potenciaContratada
        - perfilConsumo
        - consumoMensal
        - consumoAnual
        - createdAt

    CreateCustomerBody:
      type: object
      properties:
        nome:
          type: string
        morada:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        tipoCliente:
          type: string
          enum: [Residencial, Comercial, Industrial]
        precoEletricidade:
          type: number
        potenciaContratada:
          type: number
        perfilConsumo:
          type: string
          enum: [Diurno, Noturno, Personalizado]
        consumoMensal:
          type: ["number", "null"]
        consumoAnual:
          type: ["number", "null"]
      required:
        - nome
        - morada
        - latitude
        - longitude
        - tipoCliente
        - precoEletricidade
        - potenciaContratada
        - perfilConsumo

    UpdateCustomerBody:
      type: object
      properties:
        nome:
          type: string
        morada:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        tipoCliente:
          type: string
          enum: [Residencial, Comercial, Industrial]
        precoEletricidade:
          type: number
        potenciaContratada:
          type: number
        perfilConsumo:
          type: string
          enum: [Diurno, Noturno, Personalizado]
        consumoMensal:
          type: ["number", "null"]
        consumoAnual:
          type: ["number", "null"]

    # --- Solar Panel ---
    SolarPanel:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        fabricante:
          type: string
        potencia:
          type: number
        voc:
          type: number
        vmp:
          type: number
        isc:
          type: number
        imp:
          type: number
        coeficienteTemperatura:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nome
        - fabricante
        - potencia
        - voc
        - vmp
        - isc
        - imp
        - coeficienteTemperatura
        - createdAt

    CreateSolarPanelBody:
      type: object
      properties:
        nome:
          type: string
        fabricante:
          type: string
        potencia:
          type: number
        voc:
          type: number
        vmp:
          type: number
        isc:
          type: number
        imp:
          type: number
        coeficienteTemperatura:
          type: number
      required:
        - nome
        - fabricante
        - potencia
        - voc
        - vmp
        - isc
        - imp
        - coeficienteTemperatura

    UpdateSolarPanelBody:
      type: object
      properties:
        nome:
          type: string
        fabricante:
          type: string
        potencia:
          type: number
        voc:
          type: number
        vmp:
          type: number
        isc:
          type: number
        imp:
          type: number
        coeficienteTemperatura:
          type: number

    # --- Inverter ---
    Inverter:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        fabricante:
          type: string
        potenciaAc:
          type: number
        potenciaDcMax:
          type: number
        mpptMin:
          type: number
        mpptMax:
          type: number
        corrMaxMppt:
          type: number
        numMppt:
          type: integer
        stringsPorMppt:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nome
        - fabricante
        - potenciaAc
        - potenciaDcMax
        - mpptMin
        - mpptMax
        - corrMaxMppt
        - numMppt
        - stringsPorMppt
        - createdAt

    CreateInverterBody:
      type: object
      properties:
        nome:
          type: string
        fabricante:
          type: string
        potenciaAc:
          type: number
        potenciaDcMax:
          type: number
        mpptMin:
          type: number
        mpptMax:
          type: number
        corrMaxMppt:
          type: number
        numMppt:
          type: integer
        stringsPorMppt:
          type: integer
      required:
        - nome
        - fabricante
        - potenciaAc
        - potenciaDcMax
        - mpptMin
        - mpptMax
        - corrMaxMppt
        - numMppt
        - stringsPorMppt

    UpdateInverterBody:
      type: object
      properties:
        nome:
          type: string
        fabricante:
          type: string
        potenciaAc:
          type: number
        potenciaDcMax:
          type: number
        mpptMin:
          type: number
        mpptMax:
          type: number
        corrMaxMppt:
          type: number
        numMppt:
          type: integer
        stringsPorMppt:
          type: integer

    # --- Battery ---
    Battery:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        fabricante:
          type: string
        capacidade:
          type: number
        tensao:
          type: number
        tecnologia:
          type: string
          enum: [LiFePO4, Li-ion, AGM, Gel]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nome
        - fabricante
        - capacidade
        - tensao
        - tecnologia
        - createdAt

    CreateBatteryBody:
      type: object
      properties:
        nome:
          type: string
        fabricante:
          type: string
        capacidade:
          type: number
        tensao:
          type: number
        tecnologia:
          type: string
          enum: [LiFePO4, Li-ion, AGM, Gel]
      required:
        - nome
        - fabricante
        - capacidade
        - tensao
        - tecnologia

    UpdateBatteryBody:
      type: object
      properties:
        nome:
          type: string
        fabricante:
          type: string
        capacidade:
          type: number
        tensao:
          type: number
        tecnologia:
          type: string
          enum: [LiFePO4, Li-ion, AGM, Gel]

    # --- PV System ---
    PvSystem:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        panelId:
          type: integer
        inverterId:
          type: integer
        batteryId:
          type: ["integer", "null"]
        numPaineis:
          type: integer
        paineisporstring:
          type: integer
        numStrings:
          type: integer
        inclinacao:
          type: number
        azimute:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - customerId
        - panelId
        - inverterId
        - batteryId
        - numPaineis
        - paineisporstring
        - numStrings
        - inclinacao
        - azimute
        - createdAt

    CreatePvSystemBody:
      type: object
      properties:
        customerId:
          type: integer
        panelId:
          type: integer
        inverterId:
          type: integer
        batteryId:
          type: ["integer", "null"]
        numPaineis:
          type: integer
        paineisporstring:
          type: integer
        numStrings:
          type: integer
        inclinacao:
          type: number
        azimute:
          type: number
      required:
        - customerId
        - panelId
        - inverterId
        - numPaineis
        - paineisporstring
        - numStrings
        - inclinacao
        - azimute

    UpdatePvSystemBody:
      type: object
      properties:
        customerId:
          type: integer
        panelId:
          type: integer
        inverterId:
          type: integer
        batteryId:
          type: ["integer", "null"]
        numPaineis:
          type: integer
        paineisporstring:
          type: integer
        numStrings:
          type: integer
        inclinacao:
          type: number
        azimute:
          type: number

    # --- Compatibility ---
    CompatibilityResult:
      type: object
      properties:
        estado:
          type: string
          enum: [Válido, Inválido]
        erros:
          type: array
          items:
            type: string
        avisos:
          type: array
          items:
            type: string
      required:
        - estado
        - erros
        - avisos

    # --- PVGIS ---
    PvgisResult:
      type: object
      properties:
        producaoAnual:
          type: number
        producaoEspecifica:
          type: number
        producaoMensal:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyProduction"
        inclinacaoOtima:
          type: ["number", "null"]
        orientacaoOtima:
          type: ["number", "null"]
        temDuasOrientacoes:
          type: boolean
      required:
        - producaoAnual
        - producaoEspecifica
        - producaoMensal
        - inclinacaoOtima
        - orientacaoOtima
        - temDuasOrientacoes

    MonthlyProduction:
      type: object
      properties:
        mes:
          type: integer
        nomeMes:
          type: string
        producao:
          type: number
        producaoOr1:
          type: ["number", "null"]
        producaoOr2:
          type: ["number", "null"]
      required:
        - mes
        - nomeMes
        - producao
        - producaoOr1
        - producaoOr2

    # --- Financial ---
    FinancialInputBody:
      type: object
      properties:
        custoSistema:
          type: number
          description: Total system cost in EUR
        tipoTarifa:
          type: string
          enum: [simples, bi-horaria, tri-horaria, tetra-horaria]
          description: Electricity tariff type
        consumoDiario:
          type: number
          description: Daily consumption in kWh
        percHorasSol:
          type: number
          description: Percentage of consumption during solar hours (0-100)
        precoSimples:
          type: number
          description: Simple tariff price EUR/kWh
        precoForaVazio:
          type: number
          description: Off-peak price EUR/kWh (bi-horaria)
        precoVazio:
          type: number
          description: Off-peak (vazio) price EUR/kWh
        precoCheia:
          type: number
          description: Mid-peak (cheia) price EUR/kWh
        precoPonta:
          type: number
          description: Peak (ponta) price EUR/kWh
        precoSuperVazio:
          type: number
          description: Super off-peak price EUR/kWh (tetra-horaria)
        percPonta:
          type: number
          description: Percentage of consumption in ponta period (0-100)
        percCheia:
          type: number
          description: Percentage of consumption in cheia period (0-100)
        percVazio:
          type: number
          description: Percentage of consumption in vazio period (0-100)
        percSuperVazio:
          type: number
          description: Percentage of consumption in super-vazio period (0-100)
        precoVendaExcedente:
          type: number
          description: Surplus energy sale price EUR/kWh (OMIE)
        capacidadeBateria:
          type: ["number", "null"]
          description: Battery capacity in kWh (0 = no battery)
        vidaUtil:
          type: integer
          description: System lifetime in years (default 25)
        escaladaEnergia:
          type: number
          description: Annual energy price increase percentage (default 2)
        inclinacao2:
          type: ["number", "null"]
          description: Second MPPT tilt angle (optional dual orientation)
        azimute2:
          type: ["number", "null"]
          description: Second MPPT azimuth in degrees from South (optional)
        numPaineis2:
          type: ["integer", "null"]
          description: Number of panels on second MPPT (optional)
      required:
        - custoSistema
        - tipoTarifa
        - consumoDiario
        - percHorasSol
        - precoSimples
        - precoVendaExcedente

    FinancialResult:
      type: object
      properties:
        producaoAnual:
          type: number
        consumoAnual:
          type: number
        potenciaPico:
          type: number
        autoconsumo:
          type: number
        excedente:
          type: number
        taxaAutoconsumo:
          type: number
        taxaCobertura:
          type: number
        poupancaAnual:
          type: number
        receitaExcedente:
          type: number
        beneficioTotal:
          type: number
        payback:
          type: number
        tir:
          type: number
        lucroTotal:
          type: number
        emissoesCO2Evitadas:
          type: number
        arvoresEquivalentes:
          type: number
        cashFlowAnual:
          type: array
          items:
            $ref: "#/components/schemas/AnoCashFlow"
        producaoMensal:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyProduction"
      required:
        - producaoAnual
        - consumoAnual
        - potenciaPico
        - autoconsumo
        - excedente
        - taxaAutoconsumo
        - taxaCobertura
        - poupancaAnual
        - receitaExcedente
        - beneficioTotal
        - payback
        - tir
        - lucroTotal
        - emissoesCO2Evitadas
        - arvoresEquivalentes
        - cashFlowAnual
        - producaoMensal

    AnoCashFlow:
      type: object
      properties:
        ano:
          type: integer
        producao:
          type: number
        poupanca:
          type: number
        receitaExcedente:
          type: number
        beneficio:
          type: number
        cashFlow:
          type: number
        cashFlowAcumulado:
          type: number
      required:
        - ano
        - producao
        - poupanca
        - receitaExcedente
        - beneficio
        - cashFlow
        - cashFlowAcumulado

    # --- String Sizing ---
    StringSizingBody:
      type: object
      properties:
        tipoModulo:
          type: string
          description: Panel model name
        voc:
          type: number
          description: Open circuit voltage at STC (V)
        vmp:
          type: number
          description: Maximum power point voltage (V)
        isc:
          type: number
          description: Short circuit current (A)
        imp:
          type: number
          description: Maximum power point current (A)
        coefTensao:
          type: number
          description: Temperature coefficient of Voc (%/°C)
        coefCorrente:
          type: number
          description: Temperature coefficient of Isc (%/°C)
        noct:
          type: number
          description: Nominal operating cell temperature (°C)
        tipoInversor:
          type: string
          description: Inverter model name
        vmpptMin:
          type: number
          description: Inverter MPPT minimum voltage (V)
        vmpptMax:
          type: number
          description: Inverter MPPT maximum voltage (V)
        vdcMax:
          type: number
          description: Inverter absolute maximum DC voltage (V)
        impptMax:
          type: number
          description: Inverter maximum MPPT current (A)
        ipviscMax:
          type: number
          description: Inverter maximum PV Isc current (A)
        irradiancia:
          type: number
          description: Irradiance for calculation W/m2 (default 1000)
        ganhosBifacial:
          type: number
          description: Bifacial gain percentage (0-30)
      required:
        - voc
        - vmp
        - isc
        - imp
        - coefTensao
        - coefCorrente
        - noct
        - vmpptMin
        - vmpptMax
        - vdcMax
        - impptMax
        - ipviscMax

    StringSizingResult:
      type: object
      properties:
        nMinArranque:
          type: integer
          description: Minimum panels for inverter start-up
        nMaxString:
          type: integer
          description: Maximum panels per string
        nRecomendado:
          type: integer
          description: Recommended panels per string
        tabelaTermica:
          type: array
          items:
            $ref: "#/components/schemas/StringThermalRow"
        avisos:
          type: array
          items:
            type: string
        erros:
          type: array
          items:
            type: string
      required:
        - nMinArranque
        - nMaxString
        - nRecomendado
        - tabelaTermica
        - avisos
        - erros

    StringThermalRow:
      type: object
      properties:
        tAmb:
          type: integer
          description: Ambient temperature (°C)
        tCelula:
          type: number
          description: Cell temperature (°C)
        voc:
          type: number
          description: String Voc at this temperature (V)
        vmp:
          type: number
          description: String Vmp at this temperature (V)
        isc:
          type: number
          description: String Isc at this temperature (A)
        imp:
          type: number
          description: String Imp at this temperature (A)
        nPaineis:
          type: integer
          description: Number of panels in this string
        estado:
          type: string
          enum: [OK, CLIPPING, ERRO_TENSAO, ERRO_CORRENTE]
        mensagem:
          type: string
      required:
        - tAmb
        - tCelula
        - voc
        - vmp
        - isc
        - imp
        - nPaineis
        - estado
        - mensagem

    # --- Locations ---
    Location:
      type: object
      properties:
        nome:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        regiao:
          type: string
      required:
        - nome
        - latitude
        - longitude
        - regiao

    # --- Dashboard ---
    DashboardSummary:
      type: object
      properties:
        totalClientes:
          type: integer
        totalSistemas:
          type: integer
        totalPaineis:
          type: integer
        totalInversores:
          type: integer
        totalBaterias:
          type: integer
        clientesPorTipo:
          type: array
          items:
            $ref: "#/components/schemas/CountByLabel"
      required:
        - totalClientes
        - totalSistemas
        - totalPaineis
        - totalInversores
        - totalBaterias
        - clientesPorTipo

    CountByLabel:
      type: object
      properties:
        label:
          type: string
        count:
          type: integer
      required:
        - label
        - count
