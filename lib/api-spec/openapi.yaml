        - latitude
        - longitude

    CenarioPainel:
      type: object
      properties:
        potenciaWp:
          type: integer
          description: Panel wattage scenario (e.g. 300, 350, 400, 450, 500)
        quantidade:
          type: integer
          description: Number of panels needed for this wattage
        potenciaInstalada:
          type: number
          description: Total installed power in kWp for this scenario
      required:
        - potenciaWp
        - quantidade
        - potenciaInstalada

    CenarioDimensionamento:
      type: object
      properties:
        tipo:
          type: string
          enum: [conservador, equilibrado, agressivo]
          description: Scenario type
        label:
          type: string
          description: Human-readable label (e.g. "Conservador")
        descricao:
          type: string
          description: Short description of the scenario trade-offs
        potenciaInstalada:
          type: number
          description: Installed peak power in kWp
        numPaineis:
          type: integer
          description: Number of 400 Wp panels
        energiaAnualEstimada:
          type: number
          description: Estimated annual production in kWh
        coberturaReal:
          type: number
          description: Real annual coverage percentage
        producaoMensal:
          type: array
          items:
            type: number
          description: Monthly production estimates in kWh (12 values)
        consumoMensal:
          type: array
          items:
            type: number
          description: Monthly consumption estimates in kWh (12 values, flat)
        autoconsumoMensal:
          type: array
          items:
            type: number
          description: Monthly self-consumed energy in kWh (12 values)
        excessoMensal:
          type: array
          items:
            type: number
          description: Monthly grid-injected energy in kWh (12 values)
        autoconsumoAnual:
          type: number
          description: Total self-consumed energy per year in kWh
        excessoAnual:
          type: number
          description: Total grid-injected energy per year in kWh
        autoconsumoPerc:
          type: number
          description: Self-consumption ratio (% of production self-consumed)
        investimentoEstimado:
          type: number
          description: Estimated investment in EUR
        poupancaAnual:
          type: number
          description: Estimated annual savings in EUR
        paybackAnos:
          type: number
          description: Simple payback period in years
        capacidadeBateriaRecomendada:
          type: ["number", "null"]
          description: Recommended battery capacity in kWh (null if battery not included)
        inversorRecomendado:
          type: object
          nullable: true
          description: Recommended inverter from catalogue for this scenario (null if catalogue is empty)
          properties:
            id:
              type: integer
            nome:
              type: string
            fabricante:
              type: string
            potenciaAc:
              type: number
              description: Nominal AC power in kW
            numUnidades:
              type: integer
              description: Number of inverter units required
          required: [id, nome, fabricante, potenciaAc, numUnidades]
        bateriaRecomendada:
          type: object
          nullable: true
          description: Recommended battery from catalogue (null if battery not recommended or catalogue is empty)
          properties:
            id:
              type: integer
            nome:
              type: string
            fabricante:
              type: string
            capacidade:
              type: number
              description: Total capacity in kWh
          required: [id, nome, fabricante, capacidade]
        alertas:
          type: array
          description: Technical alerts for this scenario
          items:
            type: object
            properties:
              tipo:
                type: string
                enum: [info, aviso, erro]
              mensagem:
                type: string
            required: [tipo, mensagem]
        fonteProducao:
          type: string
          enum: [pvgis, estimativa_hsp]
          description: Source of monthly production data used for this scenario
      required:
        - tipo
        - label
        - descricao
        - potenciaInstalada
        - numPaineis
        - energiaAnualEstimada
        - coberturaReal
        - producaoMensal
        - consumoMensal
        - autoconsumoMensal
        - excessoMensal
        - autoconsumoAnual
        - excessoAnual
        - autoconsumoPerc
        - investimentoEstimado
        - poupancaAnual
        - paybackAnos
        - capacidadeBateriaRecomendada
        - inversorRecomendado
        - bateriaRecomendada
        - alertas

    AutoSizeResult:
      type: object
      properties:
        consumoDiario:
          type: number
          description: Daily energy consumption in kWh/day
        consumoAnualAjustado:
          type: number
          description: Annual consumption adjusted for future growth (kWh)
        energiaAlvoDiaria:
          type: number
          description: Daily solar energy target (consumption × coverage %)
        potenciaBruta:
          type: number
          description: System size before losses (kWp)
        margemPerdas:
          type: number
          description: Loss margin applied (fraction, e.g. 0.25 = 25%)
        potenciaRecomendada:
          type: number
          description: Recommended peak power in kWp (after losses margin)
        numPaineis:
          type: integer
          description: Recommended number of panels (at 400Wp typical)
        energiaAnualEstimada:
          type: number
          description: Estimated annual production in kWh
        coberturaPrevista:
          type: number
          description: Expected coverage percentage
        capacidadeBateriaRecomendada:
          type: ["number", "null"]
          description: Recommended battery capacity in kWh (null if not requested)
        hsp:
          type: number
          description: Peak sun hours used for sizing (PVGIS-derived when available, formula estimate as fallback)
        hspMensal:
          type: array
          items:
            type: number
          description: Monthly HSP equivalent derived from PVGIS (h/day × 12 months). Present only when PVGIS data was available.
          minItems: 12
          maxItems: 12
        hspMin:
          type: number
          description: Minimum monthly HSP (typically Dec–Jan). Present only when PVGIS data was available.
        hspMax:
          type: number
          description: Maximum monthly HSP (typically Jun–Jul). Present only when PVGIS data was available.
        fatorRendimento:
          type: number
          description: System efficiency factor used
        cenariosPaineis:
          type: array
          items:
            $ref: "#/components/schemas/CenarioPainel"
          description: Panel count scenarios for common wattages
        cenariosDimensionamento:
          type: array
          items:
            $ref: "#/components/schemas/CenarioDimensionamento"
          description: Three sizing scenarios (conservador, equilibrado, agressivo)
        recomendado:
          type: string
          enum: [conservador, equilibrado, agressivo]
          description: Recommended scenario type based on best payback/autoconsumo balance
        explicacao:
          type: string
          description: Human-readable explanation of the sizing
        confianca:
          type: object
          description: Confidence score for this sizing study
          properties:
            pontuacao:
              type: number
              description: Confidence score 0–100
            nivel:
              type: string
              enum: [alto, medio, baixo]
            pvgis:
              type: boolean
              description: True if PVGIS real data was used for production estimates
            avisos:
              type: array
              items:
                type: string
          required: [pontuacao, nivel, pvgis, avisos]
      required:
        - potenciaRecomendada
        - numPaineis
        - energiaAnualEstimada
        - coberturaPrevista
        - hsp
        - fatorRendimento
        - cenariosDimensionamento
        - recomendado
        - explicacao
        - confianca

    BatterySizeBody:
      type: object
      properties:
        consumoDiario:
          type: number
          description: Daily consumption in kWh
        percConsumoNoturno:
          type: number
          description: Percentage of consumption at night (0-100)
        horasAutonomia:
          type: number
          description: Target hours of autonomy (default 4)
        tensaoSistema:
          type: number
          description: System voltage in V (default 48)
        dod:
          type: number
          description: Depth of discharge % (default 80 for LiFePO4)
      required:
        - consumoDiario
        - percConsumoNoturno

    BatterySizeResult:
      type: object
      properties:
        capacidadeRecomendada:
          type: number
          description: Recommended battery capacity in kWh
        capacidadeUtilizavel:
          type: number
          description: Usable capacity after DoD in kWh
        energiaNocturna:
          type: number
          description: Night-time energy demand in kWh
        numBaterias:
          type: integer
          description: Suggested number of 10kWh battery units
        explicacao:
          type: string
      required:
        - capacidadeRecomendada
        - capacidadeUtilizavel
        - energiaNocturna
        - numBaterias
        - explicacao

    DatasheetResult:
      type: object
      properties:
        tipoEquipamento:
          type: string
          enum: [painel, inversor, bateria]
        dados:
          type: object
          description: Extracted equipment data matching the create body schema
        confianca:
          type: number
          description: AI confidence score 0-1
        notas:
          type: string
          description: Notes or warnings from AI extraction
      required:
        - tipoEquipamento
        - dados
        - confianca

