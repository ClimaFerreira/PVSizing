          type: number
          description: kWh at peak hours (bi/tri-hourly tariffs)
        consumoCheio:
          type: number
          description: kWh at full hours (bi/tri-hourly tariffs)
        consumoVazio:
          type: number
          description: kWh at off-peak/super-off-peak hours
        potenciaContratada:
          type: number
          description: Contracted power in kVA
        precoKwh:
          type: number
          description: Price per kWh in EUR
        operador:
          type: string
          description: Electricity supplier name
        tarifario:
          type: string
          description: Tariff plan type (simples, bi-horária, tri-horária)
        dataInicio:
          type: string
          description: Billing period start date YYYY-MM-DD
        dataFim:
          type: string
          description: Billing period end date YYYY-MM-DD
        periodoMeses:
          type: number
          description: Number of months covered by this invoice
        leiturasMensais:
          type: array
          description: Individual monthly readings from invoice text/table
          items:
            type: object
            properties:
              mes:
                type: string
              consumo:
                type: number
            required: [mes, consumo]
        historicoMensalGrafico:
          type: array
          description: Monthly consumption extracted from the visual bar chart on the invoice
          items:
            type: object
            properties:
              mes:
                type: string
              consumo:
                type: number
            required: [mes, consumo]
        mesesNoGrafico:
          type: integer
          description: Number of months visible in the consumption chart (0 if no chart)
        consumoAnualGrafico:
          type: number
          description: Annual estimate from chart — sum if 12 months, else average × 12
        sazonalidade:
          type: string
          description: Detected seasonality profile (verao_pico, inverno_pico, uniforme)
        confianca:
          type: number
          description: AI confidence score 0-1
        notas:
          type: string
          description: Additional notes from AI
      required:
        - confianca

    AutoSizeBody:
      type: object
      properties:
        consumoAnual:
          type: number
          description: Annual consumption in kWh
        latitude:
          type: number
        longitude:
          type: number
        inclinacao:
          type: number
          description: Panel tilt in degrees (default 30)
        azimute:
          type: number
          description: Azimuth in degrees from South (default 0)
        coberturaMeta:
          type: number
          description: Target self-consumption coverage % (default 80)
        incluirBateria:
          type: boolean
          description: Include battery in sizing (default false)
        horasAutonomia:
          type: number
          description: Target battery autonomy hours (default 4)
        crescimentoFuturo:
          type: number
          description: Expected annual consumption growth % to factor in (default 0)
        precoKwh:
          type: number
          description: Electricity price per kWh in EUR for financial calculations (default 0.18)
        consumoMensalInput:
          type: array
          items:
            type: number
          description: Monthly consumption in kWh (12 values from invoice history, optional)
        perfilDiurnoPct:
          type: number
          description: Daytime consumption percentage 0–100 (default 60)
      required:
