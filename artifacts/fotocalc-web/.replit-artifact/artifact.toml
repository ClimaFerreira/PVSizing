kind = "web"
previewPath = "/fotocalc-web/"
title = "FotoCalc"
version = "1.0.0"
id = "artifacts/fotocalc-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/fotocalc-web/" ]
localPort = 21758

[services.development]
run = "pnpm --filter @workspace/fotocalc-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fotocalc-web", "run", "build" ]
publicDir = "artifacts/fotocalc-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21758"
BASE_PATH = "/fotocalc-web/"
